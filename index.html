<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artelier | Join the Creative Wave</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* درجات الألوان المستخرجة بدقة من الشعار */
            --logo-light-blue: #bae6fd;  /* الجزء العلوي من الشعار */
            --logo-orange: #f97316;      /* الجزء الأيسر السفلي */
            --logo-yellow: #facc15;      /* الجزء الأيمن */
            --logo-deep-blue: #1e40af;   /* المثلث داخل حرف A */
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #020617; /* خلفية داكنة جداً لإبراز ألوان الشعار */
            color: #f8fafc;
            overflow-x: hidden;
        }

        .mesh-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 10% 10%, rgba(186, 230, 253, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(249, 115, 22, 0.12) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(250, 204, 21, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 100% 0%, rgba(30, 64, 175, 0.1) 0%, transparent 40%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 2.5rem;
        }

        .modern-input {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1.2rem;
            color: white;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .modern-input:focus {
            border-color: var(--logo-light-blue);
            background: rgba(255, 255, 255, 0.07);
            box-shadow: 0 0 0 4px rgba(186, 230, 253, 0.15);
            outline: none;
        }

        .btn-modern {
            /* تدرج لوني يجمع بين البرتقالي والأصفر والأزرق من الشعار */
            background: linear-gradient(135deg, var(--logo-deep-blue) 0%, var(--logo-orange) 50%, var(--logo-yellow) 100%);
            background-size: 200% auto;
            transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-modern:hover {
            background-position: right center;
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 20px 40px -10px rgba(249, 115, 22, 0.3);
        }

        .floating-logo {
            animation: float 5s ease-in-out infinite;
            filter: drop-shadow(0 0 15px rgba(186, 230, 253, 0.3));
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }

        /* تخصيص الـ Checkbox ليتناسب مع اللون الأزرق العميق */
        input[type="checkbox"]:checked {
            background-color: var(--logo-deep-blue);
            border-color: var(--logo-light-blue);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #020617; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen">

    <div class="mesh-gradient"></div>

    <main class="max-w-4xl mx-auto py-16 px-6">
        
        <!-- Animated Header Area -->
        <div class="text-center mb-16 relative">
            <!-- Decorative Glows based on logo colors -->
            <div class="absolute -top-16 left-1/4 w-48 h-48 bg-sky-500/10 blur-[100px] rounded-full"></div>
            <div class="absolute top-0 right-1/4 w-48 h-48 bg-orange-500/10 blur-[100px] rounded-full"></div>

            <div class="inline-block p-1 glass-card mb-8 floating-logo rounded-full overflow-hidden border-2 border-white/10">
                <!-- يرجى وضع رابط الشعار المرفوع هنا -->
                <img src="https://api.placeholder.com/120" alt="Artelier Logo" class="w-24 h-24 rounded-full">
            </div>

            <h1 class="text-6xl md:text-7xl font-extrabold tracking-tighter mb-4 bg-clip-text text-transparent bg-gradient-to-r from-[#bae6fd] via-[#f97316] to-[#facc15]">
                ARTELIER
            </h1>
            <p class="text-sky-200/50 text-sm font-bold tracking-[0.3em] uppercase">Creative Society</p>
        </div>

        <!-- Main Form Glass Container -->
        <div class="glass-card p-8 md:p-14 shadow-[0_32px_64px_-15px_rgba(0,0,0,0.5)] relative overflow-hidden">
            
            <form id="artelierForm" class="relative z-10 space-y-12">
                
                <!-- Section 1: Artist Identity -->
                <div class="space-y-8">
                    <div class="flex items-center space-x-4">
                        <div class="w-10 h-10 rounded-2xl bg-sky-500/20 border border-sky-400/30 flex items-center justify-center text-sky-400 font-bold">1</div>
                        <h2 class="text-2xl font-bold text-white tracking-tight">Artist Identity</h2>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="space-y-3">
                            <label class="text-[10px] uppercase tracking-[0.2em] text-sky-300/60 font-black ml-1">Full Name</label>
                            <input type="text" required class="w-full modern-input px-6 py-4" placeholder="Your creative alias">
                        </div>
                        <div class="space-y-3">
                            <label class="text-[10px] uppercase tracking-[0.2em] text-sky-300/60 font-black ml-1">Phone</label>
                            <input type="tel" required class="w-full modern-input px-6 py-4" placeholder="+213 ...">
                        </div>
                        <div class="md:col-span-2 space-y-3">
                            <label class="text-[10px] uppercase tracking-[0.2em] text-sky-300/60 font-black ml-1">Email Address</label>
                            <input type="email" required class="w-full modern-input px-6 py-4" placeholder="artist@artelier.com">
                        </div>
                    </div>
                </div>

                <!-- Section 2: Verification -->
                <div class="space-y-8">
                    <div class="flex items-center space-x-4">
                        <div class="w-10 h-10 rounded-2xl bg-orange-500/20 border border-orange-400/30 flex items-center justify-center text-orange-400 font-bold">2</div>
                        <h2 class="text-2xl font-bold text-white tracking-tight">Academic Status</h2>
                    </div>
                    
                    <div class="group relative">
                        <div class="absolute -inset-1 bg-gradient-to-r from-orange-500/20 to-yellow-500/20 rounded-[1.5rem] blur opacity-25 group-hover:opacity-60 transition duration-1000"></div>
                        <div class="relative bg-white/5 rounded-[1.5rem] p-8 border border-white/5">
                            <label class="block text-sm font-semibold mb-5 text-orange-100/80">University Registration Certificate</label>
                            <input type="file" required class="block w-full text-sm text-slate-400
                                file:mr-6 file:py-3 file:px-8
                                file:rounded-xl file:border-0
                                file:text-xs file:font-black file:uppercase file:tracking-widest
                                file:bg-orange-500 file:text-white
                                hover:file:bg-orange-600 transition-all cursor-pointer">
                        </div>
                    </div>
                </div>

                <!-- Section 3: Portfolio -->
                <div class="space-y-8">
                    <div class="flex items-center space-x-4">
                        <div class="w-10 h-10 rounded-2xl bg-yellow-500/20 border border-yellow-400/30 flex items-center justify-center text-yellow-400 font-bold">3</div>
                        <h2 class="text-2xl font-bold text-white tracking-tight">Artistic Profile</h2>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-10">
                        <div class="space-y-3">
                            <label class="text-[10px] uppercase tracking-[0.2em] text-yellow-300/60 font-black ml-1">Select Your Craft</label>
                            <select required class="w-full modern-input px-6 py-4 appearance-none cursor-pointer">
                                <option value="" disabled selected>Primary Medium</option>
                                <option>Painting & Drawing</option>
                                <option>Digital Art</option>
                                <option>Crochet</option>
                                <option>Photography</option>
                                <option>Other (Detail below)</option>
                            </select>
                        </div>
                        <div class="space-y-5">
                            <label class="text-[10px] uppercase tracking-[0.2em] text-yellow-300/60 font-black ml-1">Have you participated in any exhibitions?</label>
                            <div class="flex space-x-10 pt-1">
                                <label class="flex items-center space-x-3 cursor-pointer group">
                                    <input type="radio" name="exhibition" value="yes" class="w-5 h-5 accent-orange-500">
                                    <span class="text-sm font-medium group-hover:text-orange-300 transition">Yes</span>
                                </label>
                                <label class="flex items-center space-x-3 cursor-pointer group">
                                    <input type="radio" name="exhibition" value="no" class="w-5 h-5 accent-orange-500" checked>
                                    <span class="text-sm font-medium group-hover:text-orange-300 transition">No</span>
                                </label>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Section 4: Motivation -->
                <div class="space-y-3">
                    <label class="text-[10px] uppercase tracking-[0.2em] text-sky-300/60 font-black ml-1">Why do you want to join Artelier?</label>
                    <textarea required rows="4" class="w-full modern-input px-6 py-5 resize-none" placeholder="Share your vision and goals..."></textarea>
                </div>

                <!-- Legal Section -->
                <div class="p-8 rounded-[1.5rem] bg-white/[0.03] border border-white/10 space-y-4">
                    <label class="flex items-start space-x-5 cursor-pointer group">
                        <div class="relative flex items-center">
                            <input type="checkbox" required class="w-6 h-6 rounded-lg accent-sky-500 bg-slate-800 border-white/20 cursor-pointer">
                        </div>
                        <span class="text-sm text-slate-400 leading-relaxed group-hover:text-slate-200 transition">
                            I solemnly pledge to respect Artelier's internal regulations, maintain our creative community's standards, and actively contribute to the club's evolution.
                        </span>
                    </label>
                </div>

                <!-- Submit Button -->
                <div class="pt-6">
                    <button type="submit" class="w-full btn-modern text-white font-black py-6 rounded-[1.2rem] text-sm uppercase tracking-[0.3em] shadow-2xl">
                        Become a Member
                    </button>
                </div>
            </form>

            <div id="status" class="hidden mt-10 p-8 rounded-[1.2rem] text-center font-bold"></div>
        </div>

        <footer class="mt-24 text-center">
            <p class="text-slate-600 text-[10px] uppercase tracking-[0.4em]">Artelier Creative Laboratory &copy; 2025</p>
        </footer>
    </main>

    <script>
        document.getElementById('artelierForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const status = document.getElementById('status');
            
            status.textContent = "Analyzing your artistic profile...";
            status.className = "mt-10 p-8 rounded-[1.2rem] text-center font-bold bg-sky-500/10 text-sky-300 border border-sky-500/20 animate-pulse";
            status.classList.remove('hidden');

            setTimeout(() => {
                status.textContent = "Welcome Artist! Your application is in progress.";
                status.className = "mt-10 p-8 rounded-[1.2rem] text-center font-bold bg-emerald-500/10 text-emerald-400 border border-emerald-500/20";
                this.reset();
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }, 2500);
        });
    </script>
</body>
</html>
